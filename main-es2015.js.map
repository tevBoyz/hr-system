export default "<mat-card\n  ><form #employeeForm=\"ngForm\" (ngSubmit)=\"onSubmit(employeeForm)\" novalidate>\n    <!-- Inputs with [(ngModel)] + required -->\n\n    <mat-form-field>\n      <input\n        matInput\n        placeholder=\"First Name\"\n        [(ngModel)]=\"employee.firstName\"\n        name=\"firstName\"\n        required\n      />\n    </mat-form-field>\n\n    <mat-form-field>\n      <input\n        matInput\n        placeholder=\"Last Name\"\n        [(ngModel)]=\"employee.lastName\"\n        name=\"lastName\"\n        required\n      />\n    </mat-form-field>\n\n    <mat-form-field>\n      <input\n        matInput\n        placeholder=\"Email\"\n        [(ngModel)]=\"employee.email\"\n        name=\"email\"\n        required\n      />\n    </mat-form-field>\n\n    <mat-form-field>\n      <input\n        matInput\n        placeholder=\"Phone\"\n        [(ngModel)]=\"employee.phone\"\n        name=\"phone\"\n        required\n      />\n    </mat-form-field>\n\n    <mat-form-field appearance=\"fill\">\n      <mat-label>Company</mat-label>\n      <mat-select [(ngModel)]=\"employee.companyId\" name=\"companyId\">\n        <mat-option *ngFor=\"let company of companies\" [value]=\"company.id\">\n          {{ company.name }}\n        </mat-option>\n      </mat-select>\n    </mat-form-field>\n\n    <mat-form-field appearance=\"fill\">\n      <mat-label>Department</mat-label>\n      <mat-select [(ngModel)]=\"employee.departmentId\" name=\"departmentId\">\n        <mat-option *ngFor=\"let dept of departments\" [value]=\"dept.id\">\n          {{ dept.name }}\n        </mat-option>\n      </mat-select>\n    </mat-form-field>\n\n    <mat-form-field appearance=\"fill\">\n      <mat-label>Salary</mat-label>\n      <mat-select [(ngModel)]=\"employee.salaryId\" name=\"salaryId\">\n        <mat-option *ngFor=\"let salary of salaries\" [value]=\"salary.id\">\n          {{ salary.amount }}\n        </mat-option>\n      </mat-select>\n    </mat-form-field>\n\n    <mat-form-field>\n      <input\n        matInput\n        placeholder=\"Resume URL\"\n        [(ngModel)]=\"employee.resumeUrl\"\n        name=\"resumeUrl\"\n      />\n    </mat-form-field>\n\n    <button mat-raised-button color=\"primary\" type=\"submit\">Save</button>\n    <button\n      mat-raised-button\n      color=\"warn\"\n      class=\"cancel-btn\"\n      [routerLink]=\"['/employees']\"\n    >\n      Cancel\n    </button>\n  </form>\n</mat-card>\n"
