export default "<mat-toolbar color=\"primary\" class=\"home-toolbar\">\n  <span class=\"toolbar-title\">HR Management System</span>\n</mat-toolbar>\n\n<mat-card class=\"home-nav-card\">\n  <mat-button-toggle-group\n    [value]=\"getActiveSection()\"\n    appearance=\"standard\"\n    class=\"toggle-group\"\n  >\n    <mat-button-toggle value=\"candidates\" [routerLink]=\"['/candidates']\">\n      <mat-icon>person</mat-icon>\n      &nbsp;Candidates\n    </mat-button-toggle>\n\n    <mat-button-toggle value=\"employees\" [routerLink]=\"['/employees']\">\n      <mat-icon>badge</mat-icon>\n      &nbsp;Employees\n    </mat-button-toggle>\n\n    <mat-button-toggle value=\"companies\" [routerLink]=\"['/companies']\">\n      <mat-icon>business</mat-icon>\n      &nbsp;Companies\n    </mat-button-toggle>\n\n    <mat-button-toggle value=\"departments\" [routerLink]=\"['/departments']\">\n      <mat-icon>domain</mat-icon>\n      &nbsp;Departments\n    </mat-button-toggle>\n\n    <mat-button-toggle value=\"salaries\" [routerLink]=\"['/salaries']\">\n      <mat-icon>attach_money</mat-icon>\n      &nbsp;Salaries\n    </mat-button-toggle>\n  </mat-button-toggle-group>\n</mat-card>\n\n<div class=\"content\">\n  <router-outlet></router-outlet>\n</div>\n"
