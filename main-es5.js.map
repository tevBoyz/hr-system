export default "<mat-card\n  ><form\n    #candidateForm=\"ngForm\"\n    (ngSubmit)=\"onSubmit(candidateForm)\"\n    novalidate\n  >\n    <!-- Inputs with [(ngModel)] + required -->\n\n    <mat-form-field>\n      <input\n        matInput\n        placeholder=\"First Name\"\n        [(ngModel)]=\"candidate.firstName\"\n        name=\"firstName\"\n        required\n      />\n    </mat-form-field>\n\n    <mat-form-field>\n      <input\n        matInput\n        placeholder=\"Last Name\"\n        [(ngModel)]=\"candidate.lastName\"\n        name=\"lastName\"\n        required\n      />\n    </mat-form-field>\n\n    <mat-form-field appearance=\"fill\">\n      <mat-label>Department</mat-label>\n      <mat-select\n        [(ngModel)]=\"candidate.departmentId\"\n        name=\"departmentId\"\n        required\n      >\n        <mat-option *ngFor=\"let dept of departments\" [value]=\"dept.id\">\n          {{ dept.name }}\n        </mat-option>\n      </mat-select>\n    </mat-form-field>\n\n    <mat-form-field>\n      <input\n        matInput\n        placeholder=\"Email\"\n        [(ngModel)]=\"candidate.email\"\n        name=\"email\"\n        required\n      />\n    </mat-form-field>\n\n    <mat-form-field>\n      <input\n        matInput\n        placeholder=\"Phone\"\n        [(ngModel)]=\"candidate.phone\"\n        name=\"phone\"\n        required\n      />\n    </mat-form-field>\n\n    <mat-form-field>\n      <input\n        matInput\n        placeholder=\"Resume URL\"\n        [(ngModel)]=\"candidate.resumeUrl\"\n        name=\"resumeUrl\"\n      />\n    </mat-form-field>\n\n    <button mat-raised-button color=\"primary\" type=\"submit\">Save</button>\n    <button\n      mat-raised-button\n      color=\"warn\"\n      class=\"cancel-btn\"\n      [routerLink]=\"['/candidates']\"\n    >\n      Cancel\n    </button>\n  </form>\n</mat-card>\n"
