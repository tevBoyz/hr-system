export default "<mat-card>\n  <div class=\"top-bar\">\n    <mat-card-title>Department DB</mat-card-title>\n    <button\n      mat-raised-button\n      color=\"primary\"\n      [routerLink]=\"['/departments/add']\"\n    >\n      Add Department\n    </button>\n  </div>\n  <table\n    mat-table\n    [dataSource]=\"departments\"\n    class=\"mat-elevation-z8 candTable\"\n  >\n    <ng-container matColumnDef=\"id\">\n      <th mat-header-cell *matHeaderCellDef>ID</th>\n      <td mat-cell *matCellDef=\"let element\">{{ element.id }}</td>\n    </ng-container>\n\n    <ng-container matColumnDef=\"name\">\n      <th mat-header-cell *matHeaderCellDef>Name</th>\n      <td mat-cell *matCellDef=\"let element\">{{ element.name }}</td>\n    </ng-container>\n\n    <ng-container matColumnDef=\"companyId\">\n      <th mat-header-cell *matHeaderCellDef>Company ID</th>\n      <td mat-cell *matCellDef=\"let element\">\n        {{ getCompanyName(element.companyId) }}\n      </td>\n    </ng-container>\n\n    <ng-container matColumnDef=\"actions\">\n      <th mat-header-cell *matHeaderCellDef>Actions</th>\n      <td mat-cell *matCellDef=\"let element\">\n        <button\n          mat-button\n          color=\"accent\"\n          [routerLink]=\"['/departments/edit', element.id]\"\n        >\n          Edit\n        </button>\n        <button mat-button color=\"warn\" (click)=\"deleteDepartment(element.id)\">\n          Delete\n        </button>\n      </td>\n    </ng-container>\n\n    <tr\n      mat-header-row\n      *matHeaderRowDef=\"['id', 'name', 'companyId', 'actions']\"\n    ></tr>\n    <tr\n      mat-row\n      *matRowDef=\"let row; columns: ['id', 'name', 'companyId', 'actions']\"\n    ></tr>\n  </table>\n</mat-card>\n"
