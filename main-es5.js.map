export default "<mat-card>\n  <div class=\"top-bar\">\n    <mat-card-title>Salary DB</mat-card-title>\n    <button mat-raised-button color=\"primary\" [routerLink]=\"['/salaries/add']\">\n      Add Salary\n    </button>\n  </div>\n  <table mat-table [dataSource]=\"salaries\" class=\"mat-elevation-z8 candTable\">\n    <ng-container matColumnDef=\"id\">\n      <th mat-header-cell *matHeaderCellDef>ID</th>\n      <td mat-cell *matCellDef=\"let element\">{{ element.id }}</td>\n    </ng-container>\n    <ng-container matColumnDef=\"grade\">\n      <th mat-header-cell *matHeaderCellDef>Grade</th>\n      <td mat-cell *matCellDef=\"let element\">{{ element.grade }}</td>\n    </ng-container>\n\n    <ng-container matColumnDef=\"amount\">\n      <th mat-header-cell *matHeaderCellDef>Amount</th>\n      <td mat-cell *matCellDef=\"let element\">{{ element.amount }}</td>\n    </ng-container>\n\n    <ng-container matColumnDef=\"currency\">\n      <th mat-header-cell *matHeaderCellDef>Currency</th>\n      <td mat-cell *matCellDef=\"let element\">{{ element.currency }}</td>\n    </ng-container>\n    <ng-container matColumnDef=\"actions\">\n      <th mat-header-cell *matHeaderCellDef>Actions</th>\n      <td mat-cell *matCellDef=\"let element\">\n        <button\n          mat-button\n          color=\"accent\"\n          [routerLink]=\"['/salaries/edit', element.id]\"\n        >\n          Edit\n        </button>\n        <button mat-button color=\"warn\" (click)=\"deleteSalary(element.id)\">\n          Delete\n        </button>\n      </td>\n    </ng-container>\n\n    <tr\n      mat-header-row\n      *matHeaderRowDef=\"['id', 'grade', 'amount', 'currency', 'actions']\"\n    ></tr>\n    <tr\n      mat-row\n      *matRowDef=\"\n        let row;\n        columns: ['id', 'grade', 'amount', 'currency', 'actions']\n      \"\n    ></tr>\n  </table>\n</mat-card>\n"
