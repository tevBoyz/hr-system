export default "<mat-card\n  ><form #salaryForm=\"ngForm\" (ngSubmit)=\"onSubmit(salaryForm)\" novalidate>\n    <!-- Inputs with [(ngModel)] + required -->\n\n    <mat-form-field>\n      <input\n        matInput\n        placeholder=\"Grade\"\n        [(ngModel)]=\"salary.grade\"\n        name=\"grade\"\n        required\n      />\n    </mat-form-field>\n\n    <mat-form-field>\n      <input\n        matInput\n        placeholder=\"Amount\"\n        [(ngModel)]=\"salary.amount\"\n        name=\"amount\"\n        required\n      />\n    </mat-form-field>\n\n    <mat-form-field>\n      <input\n        matInput\n        placeholder=\"Currency\"\n        [(ngModel)]=\"salary.currency\"\n        name=\"currency\"\n        required\n      />\n    </mat-form-field>\n\n    <button mat-raised-button color=\"primary\" type=\"submit\">Save</button>\n    <button\n      mat-raised-button\n      color=\"warn\"\n      class=\"cancel-btn\"\n      [routerLink]=\"['/salaries']\"\n    >\n      Cancel\n    </button>\n  </form>\n</mat-card>\n"
