export default "<mat-card>\n  <div class=\"top-bar\">\n    <mat-card-title>Company DB</mat-card-title>\n    <button mat-raised-button color=\"primary\" [routerLink]=\"['/companies/add']\">\n      Add Company\n    </button>\n  </div>\n  <table mat-table [dataSource]=\"companies\" class=\"mat-elevation-z8 candTable\">\n    <ng-container matColumnDef=\"id\">\n      <th mat-header-cell *matHeaderCellDef>ID</th>\n      <td mat-cell *matCellDef=\"let element\">{{ element.id }}</td>\n    </ng-container>\n\n    <ng-container matColumnDef=\"name\">\n      <th mat-header-cell *matHeaderCellDef>Name</th>\n      <td mat-cell *matCellDef=\"let element\">{{ element.name }}</td>\n    </ng-container>\n    <ng-container matColumnDef=\"location\">\n      <th mat-header-cell *matHeaderCellDef>Location</th>\n      <td mat-cell *matCellDef=\"let element\">{{ element.location }}</td>\n    </ng-container>\n\n    <ng-container matColumnDef=\"establishedYear\">\n      <th mat-header-cell *matHeaderCellDef>Established Year</th>\n      <td mat-cell *matCellDef=\"let element\">{{ element.establishedYear }}</td>\n    </ng-container>\n\n    <ng-container matColumnDef=\"actions\">\n      <th mat-header-cell *matHeaderCellDef>Actions</th>\n      <td mat-cell *matCellDef=\"let element\">\n        <button\n          mat-button\n          color=\"accent\"\n          [routerLink]=\"['/companies/edit', element.id]\"\n        >\n          Edit\n        </button>\n        <button mat-button color=\"warn\" (click)=\"deleteCompany(element.id)\">\n          Delete\n        </button>\n      </td>\n    </ng-container>\n\n    <tr\n      mat-header-row\n      *matHeaderRowDef=\"[\n        'id',\n        'name',\n        'location',\n        'establishedYear',\n        'actions'\n      ]\"\n    ></tr>\n    <tr\n      mat-row\n      *matRowDef=\"\n        let row;\n        columns: ['id', 'name', 'location', 'establishedYear', 'actions']\n      \"\n    ></tr>\n  </table>\n</mat-card>\n"
