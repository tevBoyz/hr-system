export default "<mat-card\n  ><form #companyForm=\"ngForm\" (ngSubmit)=\"onSubmit(companyForm)\" novalidate>\n    <!-- Inputs with [(ngModel)] + required -->\n\n    <mat-form-field>\n      <input\n        matInput\n        placeholder=\"Name\"\n        [(ngModel)]=\"company.name\"\n        name=\"name\"\n        required\n      />\n    </mat-form-field>\n\n    <mat-form-field>\n      <input\n        matInput\n        placeholder=\"Location\"\n        [(ngModel)]=\"company.location\"\n        name=\"location\"\n        required\n      />\n    </mat-form-field>\n\n    <mat-form-field>\n      <input\n        matInput\n        placeholder=\"Established Year\"\n        [(ngModel)]=\"company.establishedYear\"\n        name=\"establishedYear\"\n      />\n    </mat-form-field>\n\n    <button mat-raised-button color=\"primary\" type=\"submit\">Save</button>\n    <button\n      mat-raised-button\n      color=\"warn\"\n      class=\"cancel-btn\"\n      [routerLink]=\"['/comapanies']\"\n    >\n      Cancel\n    </button>\n  </form>\n</mat-card>\n"
