export default "<mat-card\n  ><form\n    #departmentForm=\"ngForm\"\n    (ngSubmit)=\"onSubmit(departmentForm)\"\n    novalidate\n  >\n    <!-- Inputs with [(ngModel)] + required -->\n\n    <mat-form-field>\n      <input\n        matInput\n        placeholder=\"Name\"\n        [(ngModel)]=\"department.name\"\n        name=\"name\"\n        required\n      />\n    </mat-form-field>\n\n    <mat-form-field appearance=\"fill\">\n      <mat-label>Company</mat-label>\n      <mat-select [(ngModel)]=\"department.companyId\" name=\"companyId\">\n        <mat-option *ngFor=\"let company of companies\" [value]=\"company.id\">\n          {{ company.name }}\n        </mat-option>\n      </mat-select>\n    </mat-form-field>\n\n    <button mat-raised-button color=\"primary\" type=\"submit\">Save</button>\n    <button\n      mat-raised-button\n      color=\"warn\"\n      class=\"cancel-btn\"\n      [routerLink]=\"['/departments']\"\n    >\n      Cancel\n    </button>\n  </form>\n</mat-card>\n"
